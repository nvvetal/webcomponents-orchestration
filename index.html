<div id="container">
    <div id="palette"></div>
    <div id="inspector"></div>
    <div>
        <div id="screen"></div>
        <div id="document"></div>
    </div>
    <div id="data" style="width:400px;height:500px;"></div>
</div>
<script>

    window.addEventListener('load', function () {
        new APL({
            schemaPath: './repositories/webcomponents-apl/Schemas/home.js',
            vendors: [
                {
                    name: 'Treeselect JS',
                    description: 'https://github.com/dipson88/treeselectjs',
                    js: './repositories/webcomponents-apl/vendor/treeselectjs/treeselect.js',
                    css: './repositories/webcomponents-apl/vendor/treeselectjs/treeselect.css'
                },
                {
                    name: 'jsoneditor',
                    description: 'https://github.com/josdejong/jsoneditor',
                    js: './repositories/webcomponents-apl/vendor/jsoneditor/jsoneditor.js',
                    css: './repositories/webcomponents-apl/vendor/jsoneditor/jsoneditor.css'
                }

            ]
        });

        let customElement = document.createElement('div');
        customElement.innerHTML = 'Test';
        customElement.setAttribute('guid', '123');
        customElement.style.backgroundColor = 'red';
        customElement.setAttribute('name', `Custom`);
        customElement.setAttribute('type', `Div`);
        document.getElementById('container').appendChild(customElement);

        let from = document.createElement(AppYearMonthComponent.tag);
        from.subscribe(BestAppsComponent.EVENT_CHANGED, (data) => {
            console.log('CHANGED FROM', data);
        });
        from.setAttribute('id', `from`);
        from.setAttribute('year', `2024`);
        from.setAttribute('month', `May`);
        from.setAttribute('name', `From1`);
        from.setAttribute('type', `Calendar`);

        document.getElementById('container').appendChild(from);
        let to = document.createElement(AppYearMonthComponent.tag);
        to.subscribe(BestAppsComponent.EVENT_CHANGED, (data) => {
            console.log('CHANGED TO', data);
        });
        to.setAttribute('year', `2023`);
        to.setAttribute('month', `Jan`);
        to.setAttribute('name', `To1`);
        to.setAttribute('type', `Calendar`);
        document.getElementById('container').appendChild(to);


        //TODO: set active component options if smt changing
        setTimeout(() => {
            let el = document.getElementById('from').cloneNode(true);
            el.setAttribute('id', `from2`);
            document.getElementById('container').appendChild(el);
            let el2 = $('#from').clone(true, true);
            $('#container').append(el2);
            el2.attr('debug', 'debug');
        }, 1);
    });

</script>
