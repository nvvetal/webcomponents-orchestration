<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>APL Editor</title>
    <style>
        #container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
        }

        #palette {
            width: 150px;
            border: 1px solid black;
            border-radius: 5px;
        }

        #inspector {
            width: 300px;
            height: 500px;
            border: 1px solid black;
            border-radius: 5px;
        }

        #document {
            width: 500px;
            height: 500px;
            border: 1px solid black;
            border-radius: 5px;
        }

        #screen {
            height: 25px;
        }

        #data {
            width: 400px;
            height: 500px;
        }
    </style>

    <!-- Base scripts from webcomponents repo -->
    <script src="./repositories/webcomponents/utils/uid.js"></script>

    <script src="./repositories/webcomponents/BestAppsComponent.js"></script>

    <script src="./repositories/webcomponents/custom/ObjectInspector/BestAppsPropertyAdaptor.js"></script>

<body>
<div id="container">
    <div id="palette"></div>
    <div id="inspector"></div>
    <div>
        <div id="screen"></div>
        <div id="document"></div>
    </div>
    <div id="data"></div>
</div>
<script>

    window.addEventListener('load', function () {
        window.apl = new APL({
            schemaPath: './repositories/webcomponents-apl/Schemas/home.js',
            vendors: [
                {
                    name: 'Treeselect JS',
                    description: 'https://github.com/dipson88/treeselectjs',
                    js: './repositories/webcomponents-apl/vendor/treeselectjs/treeselect.js',
                    css: './repositories/webcomponents-apl/vendor/treeselectjs/treeselect.css'
                },
                {
                    name: 'jsoneditor',
                    description: 'https://github.com/josdejong/jsoneditor',
                    js: './repositories/webcomponents-apl/vendor/jsoneditor/jsoneditor.js',
                    css: './repositories/webcomponents-apl/vendor/jsoneditor/jsoneditor.css'
                }

            ]
        });
    });

</script>
